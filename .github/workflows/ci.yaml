---

name: Production DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA:0:7})" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t felixdvrt/production-devops-pipeline:${{ env.SHORT_SHA }} -f app/Dockerfile app

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push felixdvrt/production-devops-pipeline:${{ env.SHORT_SHA }}

      - name: Configure Git Author
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Update Helm chart with new image tag
        run: |
          sed -i "s/tag: .*/tag: ${{ env.SHORT_SHA }}/" helm/app-chart/values.yaml
          git add helm/app-chart/values.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
          git push origin main