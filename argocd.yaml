apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: production-devops-pipeline
  namespace: argocd

spec:
  project: default

  source:
    repoURL: "https://github.com/egor-dvortsevoi/production-devops-pipeline"
    targetRevision: HEAD
    path: helm/app-chart

  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true